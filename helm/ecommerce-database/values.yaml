image:
  repository: postgres
  tag: "15-alpine"

service:
  type: ClusterIP
  port: 5432

persistence:
  enabled: true
  size: 10Gi
  storageClass: standard

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env:
  - name: POSTGRES_DB
    value: "ecommerce"
  - name: POSTGRES_USER
    value: "ecommerce"
  - name: POSTGRES_PASSWORD
    value: "password"
