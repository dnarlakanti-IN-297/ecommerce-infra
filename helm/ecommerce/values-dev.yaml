# Development environment overrides

frontend:
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

backend:
  replicaCount: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

database:
  persistence:
    enabled: true
    size: 5Gi
    storageClass: standard-rwo
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

ingress:
  enabled: true
  hosts:
    - host: ecommerce-dev.34.75.0.106.nip.io
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: false
