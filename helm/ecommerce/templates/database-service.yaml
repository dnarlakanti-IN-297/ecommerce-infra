{{- if .Values.database.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-postgres
  labels:
    app: ecommerce-postgres
spec:
  type: {{ .Values.database.service.type }}
  clusterIP: None
  ports:
  - port: {{ .Values.database.service.port }}
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: ecommerce-postgres
{{- end }}
