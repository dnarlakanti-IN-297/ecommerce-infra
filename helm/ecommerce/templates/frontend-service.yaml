{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-frontend
  labels:
    app: ecommerce-frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
  - port: {{ .Values.frontend.service.port }}
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: ecommerce-frontend
{{- end }}
